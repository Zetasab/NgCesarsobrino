<section class="section section-header" aria-labelledby="hero-title">
  <nav
    class="glass-nav"
    [class.is-scrolled]="isScrolled()"
    [class.on-dark]="isOnDarkSection()"
    aria-label="Navegacion principal"
  >
    <a class="brand" href="#" aria-label="Inicio" (click)="scrollToTop($event)">
      <img class="brand-logo" src="logo.png" alt="Logo" />
    </a>
    <ul class="menu">
      <li><a href="#hero-title">Inicio</a></li>
      <li><a href="#about-title">Sobre mi</a></li>
      <li><a href="#languages-title">Lenguajes</a></li>
      <li><a href="#timeline-title">Timeline</a></li>
      <li><a href="#projects-title">Proyectos</a></li>
      <li><a href="#contact-title">Contacto</a></li>
    </ul>
    <span
      class="stats-action stats-info"
      aria-label="Informacion de estadisticas"
      title="Esta web guarda tu visita de forma anonima para propositos estadisticos"
      data-tooltip="Esta web guarda tu visita de forma anonima para propositos estadisticos"
      tabindex="0"
    >
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 20V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path d="M10 20V8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path d="M16 20V4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path d="M22 20V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
    </span>
  </nav>

  <button
    type="button"
    class="scroll-top"
    [class.is-visible]="isScrolled()"
    [class.on-dark]="isOnDarkSection()"
    (click)="scrollToTop()"
    aria-label="Volver arriba"
  >
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      <path d="M6.5 10.5L12 5l5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <div class="mouse-hint" [class.is-visible]="showMouseHint()" aria-hidden="true">
    <div class="mouse-shell">
      <span class="mouse-wheel"></span>
    </div>
    <span class="mouse-arrow">↓</span>
  </div>

  <om-aurora class="hero-aurora" [invert]="true" [versionTwo]="true">
    <div class="hero-content">
      <p class="eyebrow">Portfolio</p>
      <h1 id="hero-title">CESAR SOBRINO</h1>
      <div class="subtitle" aria-live="polite">
        <om-typewriter
          [words]="welcomeWords"
          [disableLoop]="true"
          [writeSpeed]="62"
          [deleteDelay]="2600"
          [startDelay]="300"
          [textCursorColor]="'#f5f5f5'"
          [styleClass]="'hero-typewriter'"
        />
      </div>
    </div>
  </om-aurora>
</section>
